function prazoInfo(prazo) {
  if (!prazo) return null;
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const d = new Date(prazo + "T00:00:00");
  const diff = Math.round((d - hoje) / 86400000);
  if (diff < 0)   return { label: `Vencida há ${Math.abs(diff)} dia(s)`, level: "vencida",  bg: "#FCEBEB", color: "#A32D2D", border: "#F09595" };
  if (diff === 0) return { label: "Vence hoje!",                          level: "hoje",     bg: "#FAEEDA", color: "#854F0B", border: "#EF9F27" };
  if (diff <= 3)  return { label: `Vence em ${diff} dia(s)`,              level: "urgente",  bg: "#FAEEDA", color: "#854F0B", border: "#EF9F27" };
  if (diff <= 7)  return { label: `Vence em ${diff} dia(s)`,              level: "proximo",  bg: "#E6F1FB", color: "#185FA5", border: "#85B7EB" };
  return           { label: `Prazo: ${fmtDate(prazo)}`,                   level: "ok",       bg: "#EAF3DE", color: "#3B6D11", border: "#97C459" };
}

function fmtDate(iso) {
  if (!iso) return "";
  const [y, m, d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function mesAtual() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}

function proximoPrazo(prazo, recorrencia) {
  if (!prazo) return "";
  const [ano, mes, dia] = prazo.split("-").map(Number);
  if (recorrencia === "Diária") {
    const d = new Date(ano, mes - 1, dia);
    d.setDate(d.getDate() + 1);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  if (recorrencia === "Semanal") {
    const d = new Date(ano, mes - 1, dia);
    d.setDate(d.getDate() + 7);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  if (recorrencia === "Mensal") {
    const novoMes = mes === 12 ? 1 : mes + 1;
    const novoAno = mes === 12 ? ano + 1 : ano;
    const maxDia  = new Date(novoAno, novoMes, 0).getDate();
    return `${novoAno}-${String(novoMes).padStart(2,"0")}-${String(Math.min(dia, maxDia)).padStart(2,"0")}`;
  }
  if (recorrencia === "Anual") {
    return `${ano + 1}-${String(mes).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
  }
  return prazo;
}

  return tasks;
}

// ─── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tasks, setTasks]               = useState([]);
  const [loading, setLoading]           = useState(true);
  const [syncing, setSyncing]           = useState(false);
  const [dbError, setDbError]           = useState(null);
  const [view, setView]                 = useState("geral");
  const [filterStatus, setFilterStatus] = useState("active");
  const [filterRec, setFilterRec]       = useState("all");
  const [filterAlert, setFilterAlert]   = useState(false);
  const [editId, setEditId]             = useState(null);
  const [newTaskModal, setNewTaskModal] = useState(false);
  const [newTask, setNewTask]           = useState(EMPTY_NEW);
  const [search, setSearch]             = useState("");
  const [sortBy, setSortBy]             = useState("prazo");
  const [filterResp, setFilterResp]     = useState("all");
  const [realtimeOk, setRealtimeOk]   = useState(true);
  const seeded = useRef(false);

  // ── Carregar tarefas do Supabase ──
  useEffect(() => {
    async function load() {
      setLoading(true);
      const { data, error } = await sb.from("tarefas").select("*").order("criado", { ascending: true });
      if (error) {
        setDbError(error.message);
        const saved = localStorage.getItem("rmr_tasks_v8");
        if (saved) { try { setTasks(JSON.parse(saved)); } catch {} }
      } else if (data.length === 0 && !seeded.current) {
        seeded.current = true;
        const initial = buildInitialTasks();
        const rows = initial.map(t => ({
          id: t.id, setor: t.setor, name: t.name,
          subtasks: t.subtasks || [],
          recorrencia: t.recorrencia, status: t.status,
          responsavel: t.responsavel || "", observacao: t.observacao || "",
          competencia: t.competencia || mesAtual(), prazo: t.prazo || "",
          criado: t.criado || new Date().toISOString(),
        }));
        for (let i = 0; i < rows.length; i += 100) {
          await sb.from("tarefas").insert(rows.slice(i, i + 100));
        }
        setTasks(initial);
      } else {
        const loaded = data.map(t => ({ ...t, subtasks: t.subtasks || [] }));

        // ── Deduplicação automática (race condition multi-abas) ──
        // CORREÇÃO: só remove duplicatas REAIS — mesmo setor|nome|competencia E
        // criadas com menos de 10 segundos de diferença (race condition).
        // Tarefas com mesmo nome mas criadas em momentos distintos são LEGÍTIMAS e nunca deletadas.
        const grupos = {};
        loaded.forEach(t => {
          const key = `${t.setor}|${t.name}|${t.competencia}`;
          if (!grupos[key]) grupos[key] = [];
          grupos[key].push(t);
        });
        const idsParaDeletar = [];
        Object.values(grupos).forEach(grupo => {
          if (grupo.length <= 1) return;
          // Ordena do mais recente para o mais antigo
          grupo.sort((a, b) => (b.criado || "").localeCompare(a.criado || ""));
          // Só deleta se a diferença de criação entre a mais nova e a mais antiga for < 10s
          // (indica race condition real, não tarefas diferentes com mesmo nome)
          const maisNova = new Date(grupo[0].criado || 0).getTime();
          const maisAntiga = new Date(grupo[grupo.length - 1].criado || 0).getTime();
          const diffSegundos = (maisNova - maisAntiga) / 1000;
          if (diffSegundos < 10) {
            // Race condition real: manter só a mais recente
            grupo.slice(1).forEach(t => idsParaDeletar.push(t.id));
          }
          // Se diff >= 10s: tarefas legítimas com mesmo nome — NÃO deletar
        });
        if (idsParaDeletar.length > 0) {
          console.log(`[RMR] Removendo ${idsParaDeletar.length} duplicata(s) real(is) do banco...`);
          for (let i = 0; i < idsParaDeletar.length; i += 100) {
            await sb.from("tarefas").delete().in("id", idsParaDeletar.slice(i, i + 100));
          }
        }

        let limpo = loaded.filter(t => !idsParaDeletar.includes(t.id));

        // ── Retry de tarefas pendentes (salvas localmente mas não sincronizadas) ──
        // Se o Supabase falhou no addTask anterior, a tarefa está na fila pendente.
        // Tenta reenviar agora que a conexão foi restabelecida.
        try {
          const pendentes = lsGetPending();
          const idsNoServidor = new Set(limpo.map(t => t.id));
          const paraResync = pendentes.filter(t => !idsNoServidor.has(t.id));
          for (const t of paraResync) {
            const { error: syncErr } = await sb.from("tarefas").insert([t]);
            if (!syncErr) {
              limpo = [...limpo, t];
              lsRemovePending(t.id);
              console.log(`[RMR] Tarefa ressincronizada: ${t.name}`);
            }
          }
        } catch (e) {
          console.warn("[RMR] Falha ao ressincronizar tarefas pendentes:", e);
        }

        // ── Exibe tarefas locais ainda pendentes de sync (offline-first) ──
        // CORREÇÃO: inclui pendentes que ainda não chegaram ao Supabase,
        // evitando desaparecimento de tarefas após F5 por race condition de latência.
        try {
          const pendentes = lsGetPending() || [];
          const idsJaCarregados = new Set(limpo.map(t => t.id));
          const pendentesRestantes = pendentes.filter(t => !idsJaCarregados.has(t.id));
          if (pendentesRestantes.length > 0) {
            console.log(`[RMR] Incluindo ${pendentesRestantes.length} tarefa(s) pendente(s) offline na UI.`);
            limpo = [...limpo, ...pendentesRestantes];
          }
        } catch {}

        // CORREÇÃO: atualiza localStorage ANTES de setar estado para evitar
        // inconsistência entre UI e cache local em caso de re-render rápido
        lsSetTasks(limpo);
        setTasks(limpo);
        await gerarRecorrencias(limpo);
      }
      setLoading(false);
    }
    load();
  }, []);

  // ── Gera tarefas recorrentes para o mês atual se ainda não existirem ──
  async function gerarRecorrencias(todasTarefas) {
    const mes = mesAtual();
    const anoAtual = String(new Date().getFullYear());

    // Bloqueia geração se já existe qualquer instância no mês atual com mesmo nome+setor
    const jaTemPendente = new Set(
      todasTarefas
        .filter(t => t.competencia === mes)
        .map(t => `${t.setor}|${t.name}`)
    );

    // Para Anual: bloqueia se já existe no ano corrente (pendente ou concluída)
    const jaTemAnual = new Set(
      todasTarefas
        .filter(t => t.recorrencia === "Anual" && t.competencia && t.competencia.startsWith(anoAtual))
        .map(t => `${t.setor}|${t.name}`)
    );

    // Modelo: última versão de cada tarefa recorrente (não Avulso, não cancelada)
    const modelos = {};
    todasTarefas
      .filter(t => t.recorrencia && t.recorrencia !== "Avulso" && t.status !== "cancelled")
      .forEach(t => {
        const key = `${t.setor}|${t.name}`;
        if (!modelos[key] || t.criado > modelos[key].criado) modelos[key] = t;
      });

    const novas = [];
    Object.values(modelos).forEach(modelo => {
      const key = `${modelo.setor}|${modelo.name}`;

      if (modelo.recorrencia === "Anual") {
        if (jaTemAnual.has(key)) return;
      } else {
        // Mensal/Semanal: só gera se não existe NENHUMA pendente com esse nome+setor
        if (jaTemPendente.has(key)) return;
      }

      const deveGerar =
        modelo.recorrencia === "Diária" ||
        modelo.recorrencia === "Semanal" ||
        modelo.recorrencia === "Mensal" ||
        (modelo.recorrencia === "Anual" && !jaTemAnual.has(key));

      if (!deveGerar) return;

      novas.push({
        id: crypto.randomUUID(),
        setor: modelo.setor,
        name: modelo.name,
        subtasks: [],
        recorrencia: modelo.recorrencia,
        status: "pending",
        responsavel: modelo.responsavel || "",
        observacao: modelo.observacao || "",
        competencia: mes,
        prazo: modelo.prazo || "",
        criado: new Date().toISOString(),
      });
    });

    if (novas.length === 0) return;

    for (let i = 0; i < novas.length; i += 100) {
      await sb.from("tarefas").insert(novas.slice(i, i + 100));
    }
    setTasks(p => {
      const atualizadas = [...p, ...novas];
      // BUG #3 FIX: atualiza localStorage para que o fallback reflita as recorrências geradas
      try { localStorage.setItem("rmr_tasks_v8", JSON.stringify(atualizadas)); } catch {}
      return atualizadas;
    });
    console.log(`[RMR] ${novas.length} tarefas recorrentes geradas para ${mes}`);
  }

  // ── Realtime: escuta mudanças de outros usuários ──
  useEffect(() => {
    const channel = sb.channel("tarefas-changes")
      .on("postgres_changes", { event: "*", schema: "public", table: "tarefas" }, (payload) => {
        if (payload.eventType === "INSERT") {
          setTasks(p => {
            if (p.find(t => t.id === payload.new.id)) return p;
            return [...p, { ...payload.new, subtasks: payload.new.subtasks || [] }];
          });
        } else if (payload.eventType === "UPDATE") {
          if (payload.new.status === "cancelled") {
            setTasks(p => p.filter(t => t.id !== payload.new.id));
          } else {
            setTasks(p => p.map(t => t.id === payload.new.id ? { ...payload.new, subtasks: payload.new.subtasks || [] } : t));
          }
        } else if (payload.eventType === "DELETE") {
          setTasks(p => p.filter(t => t.id !== payload.old.id));
        }
      })
      .subscribe((status) => {
        setRealtimeOk(status === "SUBSCRIBED");
      });
    return () => sb.removeChannel(channel);
  }, []);

  // ── Próxima competência (independe de prazo estar preenchido) ──
  function proximaCompetencia(competencia, recorrencia) {
    if (!competencia) return mesAtual();
    const [ano, mes] = competencia.split("-").map(Number);
    if (recorrencia === "Diária" || recorrencia === "Semanal" || recorrencia === "Mensal") {
      const novoMes = mes === 12 ? 1 : mes + 1;
      const novoAno = mes === 12 ? ano + 1 : ano;
      return `${novoAno}-${String(novoMes).padStart(2, "0")}`;
    }
    if (recorrencia === "Anual") return `${ano + 1}-${String(mes).padStart(2, "0")}`;
    return competencia;
  }

  // ── CRUD ──
  const updateTask = useCallback(async (id, ch) => {
    setTasks(p => p.map(t => t.id === id ? { ...t, ...ch } : t));
    // CORREÇÃO: persistir atualização no localStorage para sobreviver ao F5
    lsSetTasks(tasks.map(t => t.id === id ? { ...t, ...ch } : t));
    setSyncing(true);
    const { error: updateError } = await sb.from("tarefas").update(ch).eq("id", id);
    if (updateError) {
      console.error("[RMR] Erro ao atualizar tarefa:", updateError.message);
      setTasks(p => p.map(t => t.id === id ? { ...t } : t));
      setSyncing(false);
      return;
    }
    if (ch.status === "done") {
      const tarefa = tasks.find(t => t.id === id);
      if (!tarefa) { setSyncing(false); return; }
      const tarefaAtualizada = {
        ...tarefa,
        ...ch
      };
      if (tarefaAtualizada.recorrencia && tarefaAtualizada.recorrencia !== "Avulso") {
        // Prazo é opcional: se existir, avança; se não existir, a cópia nasce sem prazo
        const novoPrazo = tarefaAtualizada.prazo ? proximoPrazo(tarefaAtualizada.prazo, tarefaAtualizada.recorrencia) : "";
        const novaComp = proximaCompetencia(tarefaAtualizada.competencia, tarefaAtualizada.recorrencia);
        const jaExiste = tasks.some(t =>
          t.name === tarefa.name &&
          t.setor === tarefa.setor &&
          t.competencia === novaComp &&
          t.status !== "done"
        );
        if (jaExiste) {
          console.log("Recorrência já existe.");
          setSyncing(false);
          return;
        }
        const novaTask = {
          id: crypto.randomUUID(),
          setor: tarefaAtualizada.setor,
          name: tarefaAtualizada.name,
          subtasks: tarefaAtualizada.subtasks || [],
          recorrencia: tarefaAtualizada.recorrencia,
          status: "pending",
          responsavel: tarefaAtualizada.responsavel || "",
          observacao: tarefaAtualizada.observacao || "",
          competencia: novaComp,
          prazo: novoPrazo,
          criado: new Date().toISOString(),
        };
        const { error } = await sb.from("tarefas").insert([novaTask]);
        if (error) {
          console.error("[RMR] Erro ao criar próxima tarefa recorrente:", error.message);
        } else {
          // BUG #4 FIX: atualiza localStorage ao criar cópia recorrente
          setTasks(p => {
            if (p.find(t => t.id === novaTask.id)) return p;
            const atualizadas = [...p, novaTask];
            try { localStorage.setItem("rmr_tasks_v8", JSON.stringify(atualizadas)); } catch {}
            return atualizadas;
          });
        }
      }
    }
    setSyncing(false);
  }, [tasks]);

  const removeTask = useCallback(async (id, recorrencia) => {
    setSyncing(true);
    const ehRecorrente = recorrencia && recorrencia !== "Avulso";
    const { error } = ehRecorrente
      ? await sb.from("tarefas").update({ status: "cancelled" }).eq("id", id)
      : await sb.from("tarefas").delete().eq("id", id);
    if (error) {
      console.error("[RMR] Erro ao excluir tarefa:", error.message);
      setSyncing(false);
      return;
    }
    // BUG #5 FIX: atualiza localStorage ao remover tarefa
    setTasks(p => {
      const atualizadas = p.filter(t => t.id !== id);
      try { localStorage.setItem("rmr_tasks_v8", JSON.stringify(atualizadas)); } catch {}
      return atualizadas;
    });
    setSyncing(false);
  }, []);

  // ── Helpers de persistência local ──
  function lsGetTasks() {
    try { const s = localStorage.getItem("rmr_tasks_v8"); return s ? JSON.parse(s) : []; } catch { return []; }
  }
  function lsSetTasks(lista) {
    try { localStorage.setItem("rmr_tasks_v8", JSON.stringify(lista)); } catch {}
  }
  function lsGetPending() {
    try { const s = localStorage.getItem("rmr_pending_sync"); return s ? JSON.parse(s) : []; } catch { return []; }
  }
  function lsSetPending(lista) {
    try { localStorage.setItem("rmr_pending_sync", JSON.stringify(lista)); } catch {}
  }
  function lsAddPending(t) {
    const pendentes = lsGetPending();
    if (!pendentes.find(p => p.id === t.id)) lsSetPending([...pendentes, t]);
  }
  function lsRemovePending(id) {
    lsSetPending(lsGetPending().filter(p => p.id !== id));
  }

  const addTask = useCallback(async () => {
    if (!newTask.name.trim()) return;
    const t = {
      id: crypto.randomUUID(), setor: newTask.setor, name: newTask.name.trim(),
      subtasks: [], recorrencia: newTask.recorrencia, status: "pending",
      responsavel: newTask.responsavel, observacao: newTask.observacao,
      competencia: newTask.competencia || mesAtual(), prazo: newTask.prazo,
      criado: new Date().toISOString(),
    };
    // Persiste localmente ANTES da chamada de rede (garante sobrevivência ao F5)
    setTasks(p => { const novo = [...p, t]; lsSetTasks(novo); return novo; });
    lsAddPending(t); // fila de sync caso o Supabase falhe
    setNewTask(EMPTY_NEW);
    setNewTaskModal(false);
    setSyncing(true);
    try {
      const { error } = await sb.from("tarefas").insert([t]);
      if (error) {
        console.error("[RMR] Erro ao inserir tarefa:", error.message, error.code);
        setDbError("Tarefa salva localmente. Erro ao sincronizar com o servidor.");
        // Mantém na UI e no localStorage; será resincrornizada no próximo load
      } else {
        lsRemovePending(t.id); // sync bem-sucedido: remove da fila pendente
        setDbError(null);
      }
    } catch (e) {
      console.error("[RMR] Exceção ao inserir tarefa:", e);
      setDbError("Tarefa salva localmente. Sem conexão com o servidor.");
      // Tarefa permanece na UI e no localStorage; fila pendente já foi registrada
    }
    setSyncing(false);
  }, [newTask]);

  // ── Exportar relatório PDF ──
  const exportarPDF = useCallback((lista) => {

    const mes = mesAtual();

    const vencidas   = lista.filter(t => { const p = prazoInfo(t.prazo); return p && p.level === "vencida" && t.status !== "done"; }).length;
    const statusLabel = { pending: "Pendente", in_progress: "Em andamento", done: "Concluída" };
    const statusColor = { pending: "#854F0B", in_progress: "#185FA5", done: "#3B6D11" };
    const statusBg    = { pending: "#FAEEDA", in_progress: "#E6F1FB", done: "#EAF3DE" };
    const bySector = {};
    lista.forEach(t => { if (!bySector[t.setor]) bySector[t.setor] = []; bySector[t.setor].push(t); });
    let rows = "";
    Object.entries(INITIAL_DATA).forEach(([key, data]) => {
      const st = bySector[key] || [];
      if (st.length === 0) return;
      rows += `<tr><td colspan="5" style="background:${data.bg};color:${data.color};font-weight:600;font-size:12px;padding:6px 10px;border-top:2px solid ${data.color}">${data.label} (${st.length})</td></tr>`;
      st.forEach(t => {
        const prazo = t.prazo ? new Date(t.prazo + "T00:00:00").toLocaleDateString("pt-BR") : "—";
        const resp  = t.responsavel || "—";
        const obs   = t.observacao  || "";
        const sl    = statusLabel[t.status] || t.status;
        const sc    = statusColor[t.status] || "#444";
        const sbg   = statusBg[t.status]    || "#eee";
        rows += `<tr>
          <td style="padding:5px 10px;font-size:11px;border-bottom:0.5px solid #eee">${t.name}</td>
          <td style="padding:5px 10px;font-size:11px;border-bottom:0.5px solid #eee;white-space:nowrap"><span style="background:${sbg};color:${sc};border-radius:4px;padding:1px 6px;font-size:10px">${sl}</span></td>
          <td style="padding:5px 10px;font-size:11px;border-bottom:0.5px solid #eee;white-space:nowrap">${resp}</td>
          <td style="padding:5px 10px;font-size:11px;border-bottom:0.5px solid #eee;white-space:nowrap">${prazo}</td>
          <td style="padding:5px 10px;font-size:11px;border-bottom:0.5px solid #eee;color:#5F5E5A;font-style:italic">${obs}</td>
        </tr>`;
      });
    });
    win.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>RMR — Relatório ${mes}</title>
    <style>
      body{font-family:Arial,sans-serif;margin:0;padding:24px;color:#2C2C2A;font-size:13px}
      h1{font-size:18px;font-weight:600;margin:0 0 2px}
      .sub{font-size:12px;color:#888780;margin:0 0 16px}
      .cards{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
      .card{background:#F8F7F4;border-radius:8px;padding:10px 16px;min-width:100px}
      .card .num{font-size:22px;font-weight:600;margin:0}
      .card .lbl{font-size:11px;color:#888780;margin:0}
      table{width:100%;border-collapse:collapse}
      th{text-align:left;font-size:11px;color:#888780;padding:5px 10px;border-bottom:1px solid #D3D1C7}
      @media print{button{display:none}body{padding:10px}}
    </style></head><body>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">
      <div style="width:28px;height:28px;border-radius:6px;background:#1D6FA4;display:flex;align-items:center;justify-content:center">
        <span style="color:#fff;font-size:13px;font-weight:700">R</span></div>
      <h1>RMR Assessoria Contábil</h1>
    </div>
    <p class="sub">Relatório de tarefas — Competência ${mes} — Gerado em ${new Date().toLocaleDateString("pt-BR")}</p>
    <div class="cards">
      <div class="card"><p class="num">${totalTasks}</p><p class="lbl">Total</p></div>
      <div class="card" style="background:#EAF3DE"><p class="num" style="color:#3B6D11">${doneTasks}</p><p class="lbl">Concluídas</p></div>
      <div class="card" style="background:#E6F1FB"><p class="num" style="color:#185FA5">${andamento}</p><p class="lbl">Em andamento</p></div>
      <div class="card" style="background:#FAEEDA"><p class="num" style="color:#854F0B">${pendentes}</p><p class="lbl">Pendentes</p></div>
      ${vencidas > 0 ? `<div class="card" style="background:#FCEBEB"><p class="num" style="color:#A32D2D">${vencidas}</p><p class="lbl">Vencidas</p></div>` : ""}
    </div>
    <div style="text-align:right;margin-bottom:8px">
      <button onclick="window.print()" style="background:#1D6FA4;color:#fff;border:none;border-radius:6px;padding:7px 18px;font-size:12px;cursor:pointer">Imprimir / Salvar PDF</button>
    </div>
    <table><thead><tr>
      <th>Tarefa</th><th>Status</th><th>Responsável</th><th>Prazo</th><th>Observação</th>
    </tr></thead><tbody>${rows}</tbody></table>
    </body></html>`);
    win.document.close();
  }, [tasks]);

  const alertCount = useMemo(() =>
    tasks.filter((t) => {
      if (t.status === "done") return false;
      if (t.status === "cancelled") return false;
      const p = prazoInfo(t.prazo);
      return p && ["vencida","hoje","urgente"].includes(p.level);
    }).length, [tasks]);

  const visibleTasks = useMemo(() => {
    const filtered = tasks.filter((t) => {
      if (view !== "geral" && t.setor !== view) return false;
      if (t.status === "cancelled") return false;
      if (filterStatus === "active" && t.status === "done") return false;
      if (filterStatus !== "active" && filterStatus !== "all" && t.status !== filterStatus) return false;
      if (filterRec !== "all" && t.recorrencia !== filterRec) return false;
      if (filterAlert) {
        if (t.status === "done") return false;
        const p = prazoInfo(t.prazo);
        if (!p || !["vencida","hoje","urgente"].includes(p.level)) return false;
      }
      if (filterResp !== "all" && t.responsavel !== filterResp) return false;
      if (search && !t.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
    const levelOrder = { vencida: 0, hoje: 1, urgente: 2, proximo: 3, ok: 4 };
    const getNum = (name) => { const m = name.match(/^(\d+)/); return m ? parseInt(m[1]) : null; };
    return [...filtered].sort((a, b) => {
      if (sortBy === "az") return a.name.localeCompare(b.name, "pt-BR");
      if (sortBy === "za") return b.name.localeCompare(a.name, "pt-BR");
      if (sortBy === "num_asc") {
        const na = getNum(a.name), nb = getNum(b.name);
        if (na !== null && nb !== null) return na - nb;
        if (na !== null) return -1; if (nb !== null) return 1;
        return a.name.localeCompare(b.name, "pt-BR");
      }
      if (sortBy === "num_desc") {
        const na = getNum(a.name), nb = getNum(b.name);
        if (na !== null && nb !== null) return nb - na;
        if (na !== null) return 1; if (nb !== null) return -1;
        return b.name.localeCompare(a.name, "pt-BR");
      }
      const pa = prazoInfo(a.prazo); const pb = prazoInfo(b.prazo);
      const oa = pa ? (levelOrder[pa.level] ?? 5) : 6;
      const ob = pb ? (levelOrder[pb.level] ?? 5) : 6;
      if (oa !== ob) return oa - ob;
      if (a.prazo && b.prazo) return a.prazo.localeCompare(b.prazo);
      return 0;
    });
  }, [tasks, view, filterStatus, filterRec, filterAlert, search, sortBy, filterResp]);

  const stats = useMemo(() => ({
    total: tasks.length,
    done:  tasks.filter((t) => t.status === "done").length,
    in_progress: tasks.filter((t) => t.status === "in_progress").length,
    pending: tasks.filter((t) => t.status === "pending").length,
    vencidas: tasks.filter((t) => { const p = prazoInfo(t.prazo); return p && p.level === "vencida" && t.status !== "done"; }).length,
  }), [tasks]);

  const pct = stats.total ? Math.round((stats.done / stats.total) * 100) : 0;
  const editTask = tasks.find((t) => t.id === editId);
  const showListView = view !== "geral" || filterAlert || search || (filterStatus !== "active" && filterStatus !== "all") || filterRec !== "all";

  if (loading) return (
    <div style={{ fontFamily: "Segoe UI, Arial, sans-serif", minHeight: "100vh", background: "#F8F7F4", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 12 }}>
      <div style={{ width: 28, height: 28, borderRadius: 6, background: "#1D6FA4", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>R</span>
      </div>
      <span style={{ fontSize: 13, color: "#888780" }}>Carregando tarefas...</span>
    </div>
  );

  return (
    <div style={{ fontFamily: "Segoe UI, Arial, sans-serif", minHeight: "100vh", background: "#F8F7F4", color: "#2C2C2A" }}>

      {/* HEADER */}
      <div style={{ background: "#fff", borderBottom: "0.5px solid #D3D1C7", padding: "0 20px", display: "flex", alignItems: "center", gap: 12, height: 54, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 28, height: 28, borderRadius: 6, background: "#1D6FA4", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ color: "#fff", fontSize: 13, fontWeight: 700 }}>R</span>
          </div>
          <span style={{ fontWeight: 600, fontSize: 14 }}>RMR Assessoria Contábil</span>
          <span style={{ color: "#888780", fontSize: 12 }}>— Gestão de Tarefas</span>
          {syncing && <span style={{ fontSize: 11, color: "#185FA5", background: "#E6F1FB", borderRadius: 4, padding: "2px 8px" }}>salvando...</span>}
          {dbError && <span style={{ fontSize: 11, color: "#A32D2D", background: "#FCEBEB", borderRadius: 4, padding: "2px 8px" }}>offline</span>}
          {!dbError && !realtimeOk && <span style={{ fontSize: 11, color: "#854F0B", background: "#FAEEDA", borderRadius: 4, padding: "2px 8px" }}>⚠ sem sync ao vivo</span>}
        </div>

        {alertCount > 0 && (
          <div onClick={() => { setView("geral"); setFilterAlert(true); }}
            style={{ display: "flex", alignItems: "center", gap: 5, background: "#FCEBEB", border: "0.5px solid #F09595", borderRadius: 20, padding: "3px 10px", cursor: "pointer" }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#A32D2D", display: "inline-block" }} />
            <span style={{ fontSize: 12, color: "#A32D2D", fontWeight: 500 }}>{alertCount} alerta{alertCount > 1 ? "s" : ""} de prazo</span>
          </div>
        )}

        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          <input placeholder="Buscar por tarefa ou cliente..." value={search} onChange={(e) => setSearch(e.target.value)}
            style={{ border: "0.5px solid #D3D1C7", borderRadius: 6, padding: "5px 10px", fontSize: 12, width: 220, background: "#F8F7F4", color: "#2C2C2A" }} />
          <button onClick={() => exportarPDF(visibleTasks)}
            style={{ background: "#fff", color: "#5F5E5A", border: "0.5px solid #D3D1C7", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>
            ↓ Exportar PDF
          </button>
          <button onClick={() => setNewTaskModal(true)}
            style={{ background: "#1D6FA4", color: "#fff", border: "none", borderRadius: 6, padding: "6px 14px", fontSize: 12, fontWeight: 500, cursor: "pointer" }}>
            + Nova Tarefa
          </button>
        </div>
      </div>

      <div style={{ display: "flex", minHeight: "calc(100vh - 54px)" }}>

        {/* SIDEBAR */}
        <div style={{ width: 196, background: "#fff", borderRight: "0.5px solid #D3D1C7", padding: "14px 0", flexShrink: 0 }}>
          <NavItem label="Visão Geral" active={view === "geral" && !filterAlert} count={tasks.length}
            onClick={() => { setView("geral"); setFilterAlert(false); }} />
          {alertCount > 0 && (
            <NavItem label="Alertas de prazo" active={filterAlert} count={alertCount} alertMode
              onClick={() => { setView("geral"); setFilterAlert(true); }} />
          )}
          <div style={{ margin: "12px 14px 5px", fontSize: 10, fontWeight: 600, color: "#888780", textTransform: "uppercase", letterSpacing: "0.7px" }}>Setores</div>
          {Object.entries(INITIAL_DATA).map(([key, data]) => (
            <NavItem key={key} label={data.label} active={view === key && !filterAlert}
              dotColor={data.color} count={tasks.filter((t) => t.setor === key && t.status !== 'done' && (!t.prazo || t.prazo.startsWith(mesAtual()))).length}
              onClick={() => { setView(key); setFilterAlert(false); }} />
          ))}
          <div style={{ margin: "16px 14px 0", borderTop: "0.5px solid #D3D1C7", paddingTop: 14 }}>
            <div style={{ fontSize: 11, color: "#888780", marginBottom: 5 }}>Progresso geral</div>
            <div style={{ background: "#F1EFE8", borderRadius: 4, height: 5, overflow: "hidden" }}>
              <div style={{ background: "#639922", width: `${pct}%`, height: "100%", borderRadius: 4, transition: "width 0.5s" }} />
            </div>
            <div style={{ fontSize: 11, color: "#3B6D11", marginTop: 4, fontWeight: 500 }}>{pct}% concluído</div>
            {stats.vencidas > 0 && (
              <div style={{ marginTop: 8, fontSize: 11, color: "#A32D2D", background: "#FCEBEB", borderRadius: 5, padding: "4px 8px" }}>
                {stats.vencidas} tarefa(s) vencida(s)
              </div>
            )}
          </div>
        </div>

        {/* MAIN */}
        <div style={{ flex: 1, padding: 20, overflow: "auto" }}>

          {/* VISÃO GERAL — CARDS */}
          {!showListView ? (
            <>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 10, marginBottom: 20 }}>
                {[
                  { label: "Total",        value: stats.total,       bg: "#F1EFE8", color: "#444441" },
                  { label: "Pendentes",    value: stats.pending,     bg: "#FAEEDA", color: "#854F0B" },
                  { label: "Em andamento", value: stats.in_progress, bg: "#E6F1FB", color: "#185FA5" },
                  { label: "Concluídas",   value: stats.done,        bg: "#EAF3DE", color: "#3B6D11" },
                  { label: "Vencidas",     value: stats.vencidas,    bg: "#FCEBEB", color: "#A32D2D" },
                ].map((s) => (
                  <div key={s.label} style={{ background: s.bg, borderRadius: 8, padding: "10px 14px" }}>
                    <div style={{ fontSize: 11, color: s.color, opacity: 0.8, marginBottom: 3 }}>{s.label}</div>
                    <div style={{ fontSize: 22, fontWeight: 600, color: s.color }}>{s.value}</div>
                  </div>
                ))}
              </div>

              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                {Object.entries(INITIAL_DATA).map(([key, data]) => {
                  const st   = tasks.filter((t) => t.setor === key);
                  const done = st.filter((t) => t.status === "done").length;
                  const pctS = st.length ? Math.round((done / st.length) * 100) : 0;
                  const alertas = st.filter((t) => {
                    const p = prazoInfo(t.prazo);
                    return p && ["vencida","hoje","urgente"].includes(p.level) && t.status !== "done";
                  }).length;
                  return (
                    <div key={key} onClick={() => setView(key)}
                      style={{ background: "#fff", border: "0.5px solid #D3D1C7", borderRadius: 10, padding: 16, cursor: "pointer" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 7, marginBottom: 10 }}>
                        <div style={{ width: 9, height: 9, borderRadius: "50%", background: data.color }} />
                        <span style={{ fontWeight: 500, fontSize: 13, color: data.color }}>{data.label}</span>
                        {alertas > 0 && (
                          <span style={{ fontSize: 10, background: "#FCEBEB", color: "#A32D2D", borderRadius: 10, padding: "1px 7px" }}>
                            {alertas} alerta{alertas > 1 ? "s" : ""}
                          </span>
                        )}
                        <span style={{ marginLeft: "auto", fontSize: 11, color: "#888780" }}>{st.filter(t => t.status !== 'done' && (!t.prazo || t.prazo.startsWith(mesAtual()))).length} tarefas</span>
                      </div>
                      <div style={{ background: "#F1EFE8", borderRadius: 4, height: 4, overflow: "hidden", marginBottom: 5 }}>
                        <div style={{ background: data.color, width: `${pctS}%`, height: "100%", borderRadius: 4 }} />
                      </div>
                      <div style={{ fontSize: 11, color: "#888780" }}>{done} de {st.length} concluídas ({pctS}%)</div>
                      <div style={{ marginTop: 9, display: "flex", flexWrap: "wrap", gap: 4 }}>
                        {st.slice(0, 4).map((t) => (
                          <span key={t.id} style={{ fontSize: 10, background: data.bg, color: data.color, borderRadius: 4, padding: "2px 6px" }}>{t.name}</span>
                        ))}
                        {st.length > 4 && <span style={{ fontSize: 10, color: "#888780" }}>+{st.length - 4} mais</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </>
          ) : (
            <>
              {/* FILTROS */}
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5, marginBottom: 14, alignItems: "center" }}>
                {[["active","Ocultar concluídas"],["all","Todos"],["pending","Pendente"],["in_progress","Em andamento"],["done","Concluída"]].map(([s, label]) => (
                  <Chip key={s} active={filterStatus === s && !filterAlert} onClick={() => { setFilterStatus(s); setFilterAlert(false); }}>
                    {label}
                  </Chip>
                ))}
                <div style={{ width: 1, height: 18, background: "#D3D1C7", margin: "0 2px" }} />
                <Chip active={filterRec === "all"} onClick={() => setFilterRec("all")}>Todas rec.</Chip>
                {RECORRENCIAS.map((r) => (
                  <Chip key={r} active={filterRec === r} onClick={() => setFilterRec(r)}>{r}</Chip>
                ))}
                <div style={{ width: 1, height: 18, background: "#D3D1C7", margin: "0 2px" }} />
                <Chip active={filterResp === "all"} onClick={() => setFilterResp("all")}>Todos resp.</Chip>
                {COLABORADORES.map((r) => (
                  <Chip key={r} active={filterResp === r} onClick={() => setFilterResp(r)}>{r}</Chip>
                ))}
                {filterAlert && (
                  <Chip active danger onClick={() => setFilterAlert(false)}>Alertas ✕</Chip>
                )}
                <span style={{ marginLeft: "auto", fontSize: 11, color: "#888780" }}>{visibleTasks.length} tarefa(s)</span>
                <select value={sortBy} onChange={(e) => setSortBy(e.target.value)}
                  style={{ fontSize: 11, border: "0.5px solid #D3D1C7", borderRadius: 6, padding: "3px 8px", background: "#F8F7F4", color: "#2C2C2A", cursor: "pointer" }}>
                  <option value="prazo">↕ Por prazo</option>
                  <option value="num_asc">↑ Nº crescente</option>
                  <option value="num_desc">↓ Nº decrescente</option>
                  <option value="az">A → Z</option>
                  <option value="za">Z → A</option>
                </select>
              </div>

              {/* LEGENDA DE RECORRÊNCIAS */}
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                {RECORRENCIAS.map((r) => {
                  const rc = REC_COLORS[r];
                  return (
                    <div key={r} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: rc.color, background: rc.bg, borderRadius: 4, padding: "2px 7px" }}>
                      <div style={{ width: 6, height: 6, borderRadius: "50%", background: rc.color }} />
                      {r}
                    </div>
                  );
                })}
                <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#A32D2D", background: "#FCEBEB", borderRadius: 4, padding: "2px 7px" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#A32D2D" }} />
                  Vencida
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#854F0B", background: "#FAEEDA", borderRadius: 4, padding: "2px 7px" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#854F0B" }} />
                  Urgente / Hoje
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10, color: "#185FA5", background: "#E6F1FB", borderRadius: 4, padding: "2px 7px" }}>
                  <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#185FA5" }} />
                  Próxima semana
                </div>
              </div>

              {/* LISTA */}
              <div style={{ display: "flex", flexDirection: "column", gap: 7 }}>
                {visibleTasks.map((task) => (
                  <TaskRow key={task.id} task={task} updateTask={updateTask} removeTask={removeTask} onEdit={() => setEditId(task.id)} />
                ))}
                {visibleTasks.length === 0 && (
                  <div style={{ textAlign: "center", padding: "40px 0", color: "#888780", fontSize: 13 }}>
                    {filterAlert ? "Nenhum alerta de prazo ativo." : "Nenhuma tarefa encontrada."}
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      </div>

      {/* MODAL EDITAR */}
      {editId && editTask && (
        <Modal onClose={() => setEditId(null)} title="Editar tarefa">
          <TaskForm task={editTask} onChange={(ch) => updateTask(editId, ch)} />
          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 16 }}>
            <button onClick={() => setEditId(null)} style={btnPrimary}>Salvar</button>
          </div>
        </Modal>
      )}

      {/* MODAL NOVA TAREFA */}
      {newTaskModal && (
        <Modal onClose={() => setNewTaskModal(false)} title="Nova tarefa">
          <Field label="Nome da tarefa *">
            <input value={newTask.name} onChange={(e) => setNewTask({ ...newTask, name: e.target.value })}
              placeholder="Ex: DCTF Mensal" style={inputStyle} />
          </Field>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="Setor">
              <select value={newTask.setor} onChange={(e) => setNewTask({ ...newTask, setor: e.target.value })} style={inputStyle}>
                {Object.entries(INITIAL_DATA).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </Field>
            <Field label="Recorrência">
              <select value={newTask.recorrencia} onChange={(e) => setNewTask({ ...newTask, recorrencia: e.target.value })} style={inputStyle}>
                {RECORRENCIAS.map((r) => <option key={r}>{r}</option>)}
              </select>
            </Field>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Field label="Responsável">
              <select value={newTask.responsavel} onChange={(e) => setNewTask({ ...newTask, responsavel: e.target.value })} style={inputStyle}>
                <option value="">— Sem responsável —</option>
                {COLABORADORES.map((r) => <option key={r} value={r}>{r}</option>)}
              </select>
            </Field>
            <Field label="Prazo">
              <input type="date" value={newTask.prazo} min={todayISO()}
                onChange={(e) => setNewTask({ ...newTask, prazo: e.target.value })} style={inputStyle} />
              {newTask.prazo && (() => {
                const p = prazoInfo(newTask.prazo);
                return p ? <div style={{ fontSize: 11, color: p.color, marginTop: 3 }}>{p.label}</div> : null;
              })()}
            </Field>
          </div>
          <Field label="Competência">
            <input type="month" value={newTask.competencia} onChange={(e) => setNewTask({ ...newTask, competencia: e.target.value })} style={inputStyle} />
          </Field>
          <Field label="Observação">
            <textarea value={newTask.observacao} onChange={(e) => setNewTask({ ...newTask, observacao: e.target.value })}
              rows={2} style={{ ...inputStyle, resize: "vertical" }} />
          </Field>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 16 }}>
            <button onClick={() => setNewTaskModal(false)} style={btnSecondary}>Cancelar</button>
            <button onClick={addTask} style={btnPrimary}>Adicionar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── TASK ROW ──────────────────────────────────────────────────────────────────
function TaskRow({ task, updateTask, removeTask, onEdit }) {
  const sc   = STATUS_CFG[task.status];
  const sd   = INITIAL_DATA[task.setor] || { label: task.setor, color: "#888780", bg: "#F1EFE8" };
  const rc   = REC_COLORS[task.recorrencia] || REC_COLORS["Avulso"];
  const pi   = prazoInfo(task.prazo);
  const done = task.status === "done";

  const cycleSt = () => {
    const cycle = { pending: "in_progress", in_progress: "done", done: "pending" };
    updateTask(task.id, { status: cycle[task.status] });
  };

  const borderLeft = pi && !done
    ? `3px solid ${pi.border}`
    : "3px solid transparent";
  const borderColor = pi && pi.level === "vencida" && !done ? "#F09595" : "#D3D1C7";

  return (
    <div style={{ background: "#fff", border: `0.5px solid ${borderColor}`, borderLeft, borderRadius: 8, padding: "11px 14px", display: "flex", alignItems: "flex-start", gap: 11 }}>

      {/* Círculo de status */}
      <div onClick={cycleSt} style={{
        width: 19, height: 19, borderRadius: "50%", border: `2px solid ${sc.border}`,
        background: done ? sc.border : "transparent", cursor: "pointer", flexShrink: 0,
        marginTop: 2, display: "flex", alignItems: "center", justifyContent: "center",
      }}>
        {done && <span style={{ color: "#fff", fontSize: 10, fontWeight: 700 }}>✓</span>}
        {task.status === "in_progress" && <div style={{ width: 7, height: 7, borderRadius: "50%", background: sc.border }} />}
      </div>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 13, fontWeight: done ? 400 : 500, textDecoration: done ? "line-through" : "none", color: done ? "#888780" : "#2C2C2A" }}>
            {task.name}
          </span>
          <Badge bg={sd.bg} color={sd.color}>{sd.label}</Badge>
          <Badge bg={rc.bg} color={rc.color}>{task.recorrencia}</Badge>
          <Badge bg={sc.bg} color={sc.color}>{STATUS[task.status]}</Badge>
          {task.competencia && <span style={{ fontSize: 10, color: "#888780" }}>{task.competencia}</span>}
        </div>

        {/* Alerta de prazo */}
        {pi && !done && (
          <div style={{ marginTop: 5, display: "inline-flex", alignItems: "center", gap: 5, background: pi.bg, border: `0.5px solid ${pi.border}`, borderRadius: 5, padding: "3px 9px" }}>
            {pi.level !== "ok" && <span style={{ width: 6, height: 6, borderRadius: "50%", background: pi.color, display: "inline-block", flexShrink: 0 }} />}
            <span style={{ fontSize: 11, color: pi.color, fontWeight: pi.level !== "ok" ? 500 : 400 }}>{pi.label}</span>
          </div>
        )}
        {done && task.prazo && (
          <div style={{ marginTop: 4, fontSize: 11, color: "#888780" }}>Prazo: {fmtDate(task.prazo)} — concluída</div>
        )}

        {task.subtasks && task.subtasks.length > 0 && (
          <div style={{ marginTop: 5, display: "flex", flexWrap: "wrap", gap: 3 }}>
            {task.subtasks.map((s) => (
              <span key={s} style={{ fontSize: 10, background: "#F1EFE8", color: "#5F5E5A", borderRadius: 3, padding: "1px 6px" }}>{s}</span>
            ))}
          </div>
        )}
        <div style={{ display: "flex", gap: 12, marginTop: 4, flexWrap: "wrap" }}>
          {task.responsavel && <span style={{ fontSize: 11, color: "#185FA5", background: "#E6F1FB", borderRadius: 4, padding: "1px 7px", fontWeight: 500 }}>{task.responsavel}</span>}
          {task.observacao   && <span style={{ fontSize: 11, color: "#5F5E5A", fontStyle: "italic" }}>{task.observacao}</span>}
        </div>
      </div>

      <div style={{ display: "flex", gap: 5, flexShrink: 0 }}>
        <button onClick={onEdit}                style={btnSm("#F1EFE8","#444441")}>Editar</button>
        <button onClick={() => { if (window.confirm(`Excluir "${task.name}"?`)) removeTask(task.id, task.recorrencia); }} style={btnSm("#FCEBEB","#A32D2D")}>✕</button>
      </div>
    </div>
  );
}

// ─── TASK FORM ─────────────────────────────────────────────────────────────────
function TaskForm({ task, onChange }) {
  const pi = prazoInfo(task.prazo);
  return (
    <>
      <Field label="Nome">
        <input value={task.name} onChange={(e) => onChange({ name: e.target.value })} style={inputStyle} />
      </Field>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Field label="Setor">
          <select value={task.setor} onChange={(e) => onChange({ setor: e.target.value })} style={inputStyle}>
            {Object.entries(INITIAL_DATA).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
        </Field>
        <Field label="Recorrência">
          <select value={task.recorrencia} onChange={(e) => onChange({ recorrencia: e.target.value })} style={inputStyle}>
            {RECORRENCIAS.map((r) => <option key={r}>{r}</option>)}
          </select>
        </Field>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <Field label="Responsável">
          <select value={task.responsavel || ""} onChange={(e) => onChange({ responsavel: e.target.value })} style={inputStyle}>
            <option value="">— Sem responsável —</option>
            {COLABORADORES.map((r) => <option key={r} value={r}>{r}</option>)}
          </select>
        </Field>
        <Field label="Prazo">
          <input type="date" value={task.prazo || ""} onChange={(e) => onChange({ prazo: e.target.value })} style={inputStyle} />
          {pi && task.status !== "done" && (
            <div style={{ fontSize: 11, color: pi.color, marginTop: 3 }}>{pi.label}</div>
          )}
        </Field>
      </div>
      <Field label="Competência">
        <input type="month" value={task.competencia || ""} onChange={(e) => onChange({ competencia: e.target.value })} style={inputStyle} />
      </Field>
      <Field label="Observação">
        <textarea value={task.observacao || ""} onChange={(e) => onChange({ observacao: e.target.value })} rows={3} style={{ ...inputStyle, resize: "vertical" }} />
      </Field>
    </>
  );
}

// ─── UI ATOMS ──────────────────────────────────────────────────────────────────
function NavItem({ label, active, onClick, dotColor, count, alertMode }) {
  return (
    <div onClick={onClick} style={{
      display: "flex", alignItems: "center", gap: 7, padding: "7px 14px", cursor: "pointer",
      background: active ? (alertMode ? "#FCEBEB" : "#E6F1FB") : "transparent",
      borderLeft: active ? `2px solid ${alertMode ? "#A32D2D" : "#1D6FA4"}` : "2px solid transparent",
    }}>
      {dotColor && <div style={{ width: 8, height: 8, borderRadius: "50%", background: dotColor, flexShrink: 0 }} />}
      {alertMode && !dotColor && <span style={{ fontSize: 12 }}>⚑</span>}
      <span style={{ fontSize: 12, color: active ? (alertMode ? "#A32D2D" : "#185FA5") : "#444441", fontWeight: active ? 500 : 400, flex: 1 }}>{label}</span>
      <span style={{ fontSize: 10, background: alertMode ? "#FCEBEB" : "#F1EFE8", color: alertMode ? "#A32D2D" : "#5F5E5A", borderRadius: 10, padding: "1px 6px", border: alertMode ? "0.5px solid #F09595" : "none" }}>{count}</span>
    </div>
  );
}

function Modal({ children, onClose, title }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.35)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 1000 }} onClick={onClose}>
      <div style={{ background: "#fff", borderRadius: 10, padding: 22, width: 480, maxWidth: "92vw", maxHeight: "90vh", overflow: "auto" }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <span style={{ fontWeight: 600, fontSize: 14 }}>{title}</span>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 17, cursor: "pointer", color: "#888780" }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 11 }}>
      <label style={{ display: "block", fontSize: 11, color: "#888780", marginBottom: 4 }}>{label}</label>
      {children}
    </div>
  );
}

function Badge({ bg, color, children }) {
  return <span style={{ fontSize: 10, background: bg, color, borderRadius: 4, padding: "2px 6px", whiteSpace: "nowrap" }}>{children}</span>;
}

function Chip({ active, onClick, children, danger }) {
  return (
    <button onClick={onClick} style={{
      fontSize: 11, borderRadius: 5, padding: "4px 9px", cursor: "pointer",
      background: active ? (danger ? "#A32D2D" : "#1D6FA4") : "#fff",
      color:      active ? "#fff"    : (danger ? "#A32D2D" : "#5F5E5A"),
      border:     `0.5px solid ${active ? (danger ? "#A32D2D" : "#1D6FA4") : "#D3D1C7"}`,
      fontWeight: active ? 500 : 400,
    }}>{children}</button>
  );
}

const inputStyle   = { width: "100%", border: "0.5px solid #D3D1C7", borderRadius: 6, padding: "6px 9px", fontSize: 12, background: "#F8F7F4", color: "#2C2C2A", boxSizing: "border-box" };
const btnPrimary   = { background: "#1D6FA4", color: "#fff", border: "none", borderRadius: 6, padding: "7px 18px", fontSize: 12, fontWeight: 500, cursor: "pointer" };
const btnSecondary = { background: "#fff", color: "#5F5E5A", border: "0.5px solid #D3D1C7", borderRadius: 6, padding: "7px 16px", fontSize: 12, cursor: "pointer" };
const btnSm        = (bg, color) => ({ fontSize: 11, background: bg, border: "none", borderRadius: 5, padding: "4px 8px", cursor: "pointer", color });


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


</body></html>
